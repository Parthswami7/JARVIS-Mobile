name: Build JARVIS APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # Updated to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.10'

      - name: Set up Java
        uses: actions/setup-java@v4 # Added for Android compatibility
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4 # Updated to v4 (Fixes your error)
        with:
          name: jarvis-apk
          path: build/apk/*.apk
